<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تأكيد النجاح</title>
    <style>
        body { font-family: Tahoma, sans-serif; margin: 50px; text-align: center; background-color: #e9f7ef; color: #1e7e34; }
        .success-box { 
            background-color: white; 
            padding: 50px; 
            border-radius: 10px; 
            box-shadow: 0 4px 8px rgba(0,0,0,0.1); 
            width: 80%; 
            max-width: 500px; 
            margin: 100px auto;
            border: 3px solid #28a745;
        }
        h1 { font-size: 2em; margin-bottom: 20px; }
        p { font-size: 1.2em; }
        .icon { font-size: 4em; color: #28a745; margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="success-box">
        <div class="icon">✅</div>
        <h1>تم تأكيد المعلومات بنجاح!</h1>
        <p>شكرًا لتسجيلك. لقد تم حفظ طلبك وسنتواصل معك قريبًا.</p>
        <p>هذه الصفحة هي نهاية مسار العميل.</p>
    </div>
</body>
</html>
